<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Leitor de Contas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
button { padding: 10px; margin-top: 10px; }
table { margin-top: 20px; border-collapse: collapse; width: 100%; }
td, th { border: 1px solid #ccc; padding: 8px; }
</style>

</head>
<body>

<h2>📄 Importar Contas</h2>

<input type="file" id="files" multiple>
<br>
<button onclick="processar()">Processar</button>
<button onclick="exportar()">Exportar Excel</button>

<table>
<thead>
<tr>
<th>Arquivo</th>
<th>Tipo</th>
<th>Valor</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>

let dados = [];

function identificarTipo(nome) {
  nome = nome.toLowerCase();
  if (nome.includes("agua") || nome.includes("sabesp")) return "Água";
  if (nome.includes("energia") || nome.includes("luz")) return "Energia";
  return "Desconhecido";
}

function processar() {
  const files = document.getElementById("files").files;

  for (let file of files) {

    let info = {
      arquivo: file.name,
      tipo: identificarTipo(file.name),
      valor: "Preencher",
      data: "Preencher"
    };

    dados.push(info);
    adicionarTabela(info);
  }
}

function adicionarTabela(info) {
  let tabela = document.getElementById("tabela");
  let row = tabela.insertRow();

  row.insertCell(0).innerText = info.arquivo;
  row.insertCell(1).innerText = info.tipo;
  row.insertCell(2).innerText = info.valor;
  row.insertCell(3).innerText = info.data;
}

function exportar() {
  const ws = XLSX.utils.json_to_sheet(dados);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Contas");
  XLSX.writeFile(wb, "contas.xlsx");
}

</script>

</body>
</html>
